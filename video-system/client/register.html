<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Register</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
  <div class="brand">
    <span class="brand-badge">OV</span>
    Identity
  </div>
  <nav class="nav-links">
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
  </nav>
</header>

<div class="form-card">
  <h1>Create Account</h1>
  <form id="register-form">
    <input type="text" id="username" placeholder="Display name (optional)">
    <button type="submit">Register</button>
  </form>
  <div class="helper">Private key will be stored locally for signing actions.</div>
  <div class="action-list">
    <button id="export-keys" type="button" class="action">Export Keys <span>JSON</span></button>
    <label class="action">
      Import Keys
      <input type="file" id="import-keys" accept="application/json" style="display:none">
      <span>JSON</span>
    </label>
  </div>
  <textarea id="public-key" placeholder="Public key" readonly rows="3" style="margin-top:12px"></textarea>
</div>

<script src="js/api.js"></script>
<script src="js/register.js"></script>

</body>
</html>
