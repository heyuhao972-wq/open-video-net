<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>我的</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="container">
  <div class="topbar">
    <div class="brand">我的个人资料</div>
    <div class="nav">
      <a href="index.html">首页</a>
      <a href="upload.html">上传</a>
      <a href="#" id="logout-btn">退出</a>
    </div>
  </div>

  <div class="panel">
    <div id="profile-box">
      <div id="profile-info"></div>
    </div>
  </div>

  <div class="section">
    <h2>更新个人资料</h2>
    <div class="panel">
      <form id="nickname-form">
        <input type="text" id="nickname-input" placeholder="昵称">
        <input type="text" id="avatar-input" placeholder="头像URL">
        <input type="text" id="bio-input" placeholder="个人简介">
        <button type="submit">保存</button>
      </form>
    </div>
  </div>

  <div class="section">
    <h2>我的视频</h2>
    <div class="panel">
      <div id="edit-box" class="stack">
        <input type="text" id="edit-id" placeholder="视频ID">
        <input type="text" id="edit-title" placeholder="标题">
        <input type="text" id="edit-desc" placeholder="描述">
        <input type="text" id="edit-tags" placeholder="标签（逗号分隔）">
        <button id="edit-save">保存</button>
      </div>
    </div>
    <ul id="my-videos"></ul>
  </div>

  <div class="section">
    <h2>我的点赞</h2>
    <ul id="my-likes"></ul>
  </div>

  <div class="section">
    <h2>我的收藏</h2>
    <ul id="my-favorites"></ul>
  </div>

  <div class="section">
    <h2>观看历史</h2>
    <ul id="my-history"></ul>
  </div>

  <div class="section">
    <h2>关注</h2>
    <ul id="my-follows"></ul>
  </div>

  <div class="section">
    <h2>粉丝</h2>
    <ul id="my-followers"></ul>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/me.js"></script>

</body>
</html>
