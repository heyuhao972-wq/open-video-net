<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Me</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="container">
  <div class="topbar">
    <div class="brand">My Profile</div>
    <div class="nav">
      <a href="index.html">Home</a>
      <a href="upload.html">Upload</a>
    </div>
  </div>

  <div class="panel">
    <div id="profile-box">
      <div id="profile-info"></div>
    </div>
  </div>

  <div class="section">
    <h2>Update Profile</h2>
    <div class="panel">
      <form id="nickname-form">
        <input type="text" id="nickname-input" placeholder="Nickname">
        <input type="text" id="avatar-input" placeholder="Avatar URL">
        <input type="text" id="bio-input" placeholder="Bio">
        <button type="submit">Save</button>
      </form>
    </div>
  </div>

  <div class="section">
    <h2>My Videos</h2>
    <div class="panel">
      <div id="edit-box" class="stack">
        <input type="text" id="edit-id" placeholder="Video ID">
        <input type="text" id="edit-title" placeholder="Title">
        <input type="text" id="edit-desc" placeholder="Description">
        <input type="text" id="edit-tags" placeholder="Tags (comma)">
        <button id="edit-save">Save</button>
      </div>
    </div>
    <ul id="my-videos"></ul>
  </div>

  <div class="section">
    <h2>My Likes</h2>
    <ul id="my-likes"></ul>
  </div>

  <div class="section">
    <h2>My Favorites</h2>
    <ul id="my-favorites"></ul>
  </div>

  <div class="section">
    <h2>Watch History</h2>
    <ul id="my-history"></ul>
  </div>

  <div class="section">
    <h2>Following</h2>
    <ul id="my-follows"></ul>
  </div>

  <div class="section">
    <h2>Followers</h2>
    <ul id="my-followers"></ul>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/me.js"></script>

</body>
</html>
