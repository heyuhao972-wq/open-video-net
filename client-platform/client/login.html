<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Login</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="container">
  <div class="topbar">
    <div class="brand">Login</div>
    <div class="nav">
      <a href="index.html">Home</a>
      <a href="register.html">Register</a>
    </div>
  </div>

  <div class="hero">
    Sign in using your public key. Your private key never leaves the browser.
  </div>

  <div class="panel stack">
    <form id="login-form">
      <input type="text" id="public_key" placeholder="Public Key (optional if imported)">
      <button type="submit">Login</button>
    </form>
  </div>

  <div class="section">
    <h2>Keys</h2>
    <div class="panel stack">
      <textarea id="key-json" rows="6" placeholder="Paste key JSON here"></textarea>
      <div class="footer-actions">
        <button type="button" id="import-keys">Import Keys</button>
        <button type="button" id="export-keys" class="secondary">Export Keys</button>
        <button type="button" id="download-keys" class="secondary">Download Keys</button>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/login.js"></script>

</body>
</html>
