<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>上传视频</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="container">
  <div class="topbar">
    <div class="brand">上传</div>
    <div class="nav">
      <a href="index.html">首页</a>
      <a href="me.html">我的</a>
    </div>
  </div>

  <div class="hero">
    上传带有标签和可选封面图片的视频。
  </div>

  <div class="panel stack">
    <form id="upload-form">
      <input type="text" id="title" placeholder="视频标题">
      <input type="text" id="description" placeholder="描述">
      <input type="text" id="tags" placeholder="标签（逗号分隔）">
      <input type="file" id="cover">
      <input type="file" id="file">
      <button type="submit">上传</button>
    </form>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/upload.js"></script>

</body>
</html>
