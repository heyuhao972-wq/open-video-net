<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>播放器</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="container">
  <div class="topbar">
    <div class="brand">播放器</div>
    <div class="nav">
      <a href="index.html">首页</a>
      <a href="me.html">我的</a>
    </div>
  </div>

  <div class="panel">
    <video id="player" width="720" controls autoplay preload="auto"></video>
    <div id="meta"></div>
    <div class="footer-actions">
      <button id="like-btn">点赞</button>
      <button id="share-btn" class="secondary">分享</button>
      <button id="not-interested-btn" class="secondary">不感兴趣</button>
      <button id="favorite-btn">收藏</button>
      <button id="unfavorite-btn" class="secondary">取消收藏</button>
      <button id="follow-btn">关注作者</button>
      <button id="unfollow-btn" class="secondary">取消关注作者</button>
    </div>
  </div>

  <div class="section">
    <h2>评论</h2>
    <div id="stats"></div>
    <div id="comment-status"></div>
    <div class="panel stack">
      <div id="replying-to"></div>
      <form id="comment-form">
        <input type="text" id="comment-input" placeholder="写评论">
        <button type="submit">发布</button>
        <button type="button" id="cancel-reply" class="secondary">取消回复</button>
      </form>
    </div>
    <ul id="comment-list"></ul>
  </div>
</div>

    <script src="js/api.js?v=3"></script>
<script src="js/player.js?v=2"></script>

</body>
</html>
