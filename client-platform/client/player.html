<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Player</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="container">
  <div class="topbar">
    <div class="brand">Player</div>
    <div class="nav">
      <a href="index.html">Home</a>
      <a href="me.html">Me</a>
    </div>
  </div>

  <div class="panel">
    <video id="player" width="720" controls autoplay preload="auto"></video>
    <div id="meta"></div>
    <div class="footer-actions">
      <button id="like-btn">Like</button>
      <button id="share-btn" class="secondary">Share</button>
      <button id="not-interested-btn" class="secondary">Not Interested</button>
      <button id="favorite-btn">Favorite</button>
      <button id="unfavorite-btn" class="secondary">Unfavorite</button>
      <button id="follow-btn">Follow Author</button>
      <button id="unfollow-btn" class="secondary">Unfollow Author</button>
    </div>
  </div>

  <div class="section">
    <h2>Comments</h2>
    <div id="stats"></div>
    <div id="comment-status"></div>
    <div class="panel stack">
      <form id="comment-form">
        <input type="text" id="comment-input" placeholder="Write a comment">
        <button type="submit">Post</button>
      </form>
    </div>
    <ul id="comment-list"></ul>
  </div>
</div>

<script src="js/api.js?v=2"></script>
<script src="js/player.js?v=2"></script>

</body>
</html>
