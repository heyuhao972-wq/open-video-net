<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>注册</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="container">
  <div class="topbar">
    <div class="brand">创建账号</div>
    <div class="nav">
      <a href="index.html">首页</a>
      <a href="login.html">登录</a>
    </div>
  </div>

  <div class="hero">
    生成或导入密钥对，然后注册您的公钥。
  </div>

  <div class="panel stack">
    <form id="register-form">
      <input type="text" id="public_key" placeholder="公钥（如果已导入则可选）">
      <button type="submit">注册</button>
    </form>
  </div>

  <div class="section">
    <h2>密钥</h2>
    <div class="panel stack">
      <textarea id="key-json" rows="6" placeholder="在此粘贴密钥JSON"></textarea>
      <div class="footer-actions">
        <button type="button" id="generate-keys">生成密钥</button>
        <button type="button" id="import-keys">导入密钥</button>
        <button type="button" id="export-keys" class="secondary">导出密钥</button>
        <button type="button" id="download-keys" class="secondary">下载密钥</button>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/register.js"></script>

</body>
</html>
