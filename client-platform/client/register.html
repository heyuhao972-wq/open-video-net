<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Register</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="container">
  <div class="topbar">
    <div class="brand">Create Account</div>
    <div class="nav">
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
    </div>
  </div>

  <div class="hero">
    Generate or import a keypair, then register your public key.
  </div>

  <div class="panel stack">
    <form id="register-form">
      <input type="text" id="public_key" placeholder="Public Key (optional if imported)">
      <button type="submit">Register</button>
    </form>
  </div>

  <div class="section">
    <h2>Keys</h2>
    <div class="panel stack">
      <textarea id="key-json" rows="6" placeholder="Paste key JSON here"></textarea>
      <div class="footer-actions">
        <button type="button" id="generate-keys">Generate Keys</button>
        <button type="button" id="import-keys">Import Keys</button>
        <button type="button" id="export-keys" class="secondary">Export Keys</button>
        <button type="button" id="download-keys" class="secondary">Download Keys</button>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/register.js"></script>

</body>
</html>
